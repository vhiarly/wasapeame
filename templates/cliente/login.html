<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wappi — Mi Negocio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-blue-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">Wappi</h1>
            <p class="text-blue-200">Accede a tu negocio</p>
        </div>

        <!-- Card -->
        <div class="bg-blue-800 rounded-lg shadow-2xl p-8 border border-blue-700">

            {% if error %}
            <div class="mb-6 p-4 bg-red-500/20 border border-red-500 rounded text-red-300 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-6">
                <div>
                    <label for="codigo" class="block text-sm font-medium text-blue-100 mb-2">
                        Código del negocio
                    </label>
                    <input
                        type="text"
                        id="codigo"
                        name="codigo"
                        required
                        autofocus
                        maxlength="10"
                        class="w-full px-4 py-2 bg-blue-700 border border-blue-600 rounded text-white placeholder-blue-300 focus:outline-none focus:border-white font-mono uppercase"
                        placeholder="Ej: SE1"
                    >
                </div>

                <div>
                    <label for="pin" class="block text-sm font-medium text-blue-100 mb-2">
                        PIN
                    </label>
                    <input
                        type="password"
                        id="pin"
                        name="pin"
                        required
                        maxlength="20"
                        class="w-full px-4 py-2 bg-blue-700 border border-blue-600 rounded text-white placeholder-blue-300 focus:outline-none focus:border-white font-mono"
                        placeholder="Tu PIN"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full px-4 py-2 bg-white hover:bg-blue-50 text-blue-900 font-bold rounded transition"
                >
                    Acceder
                </button>
            </form>

            <div class="mt-6 p-4 bg-blue-700 rounded text-sm text-blue-100">
                <p class="font-medium mb-2">💡 ¿No sabes tu código?</p>
                <p>Tu dueño te lo envió por WhatsApp cuando te registraste en Wappi.</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8 text-blue-200 text-sm">
            <p>© 2026 Wappi. Todos los derechos reservados.</p>
        </div>
    </div>

</body>
</html>
